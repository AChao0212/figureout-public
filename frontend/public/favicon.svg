<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Square, no radius, and the wordmark's own letterforms: the site's mark is
       set in mono with wide tracking, so the icon is the same F on the same
       ground rather than a rounded gold badge from the old palette. -->
  <rect width="32" height="32" fill="#08080a"/>
  <text x="16" y="23" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
        font-weight="500" font-size="20" letter-spacing="1" fill="#f2eee6">F</text>
</svg>
